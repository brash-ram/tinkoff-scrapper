app:
    test: test
    scheduler:
        interval: 30000
    database-access-type: jpa
    useQueue: true

rabbit:
    queue: scrapper-queue
    exchange: scrapper-exchange


scheduler:
    linkUpdate: 60000
api:
    github:
        token: ${GITHUB_TOKEN}

baseUrl:
    github: https://api.github.com
    stackOverflow: https://api.stackexchange.com/2.3
    bot: ${BOT_URL}

default:
    timeout: 30

springdoc:
    swagger-ui:
        path: /swagger-ui.html
server:
    port: 8081

spring:
    jpa:
        defer-datasource-initialization: false
        properties:
            hibernate:
                format_sql: true
                generate_statistics: false
                jdbc:
                    batch_size: 50
                    fetch_size: 50
                order_updates: true
                order_insert: true
        open-in-view: true
        show-sql: true
        hibernate:
            ddl-auto: none
    datasource:
        url: ${DB_URL}
        username: postgres
        password: qwerty
        driver-class-name: org.postgresql.Driver

    rabbitmq:
        host: ${RABBIT_HOST}
        username: user
        password: qwerty
        port: 5672
